<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Technova Login</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="login-page">
  <main class="section login-section">
    <div class="container login-card">
      <div class="login-hero">
        <span class="section-label">Technova Access</span>
        <h1>Sign in to continue to the internship portal</h1>
        <p>Applicants can submit internship applications and admins can review applications from a secure dashboard.</p>
      </div>
      <form class="login-form" method="POST" action="/login">
        <div class="input-group login-role-group">
          <label><input type="radio" name="role" value="applicant" checked /> Applicant</label>
          <label><input type="radio" name="role" value="admin" /> Admin</label>
        </div>
        <div class="input-group">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" placeholder="you@domain.com" required />
        </div>
        <div class="input-group">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" placeholder="Enter password" required />
        </div>
        <button type="submit" class="btn btn-primary">Continue</button>
        <p class="login-tip">Admin credentials: admin@technova.com / Admin@123</p>
      </form>
    </div>
  </main>
</body>
</html>
